name: Manual PR Build

on:
  workflow_dispatch:
    inputs:
      pr:
        description: 'PR number to test'
        required: true

jobs:
  run-on-pr-head:
    permissions:
      pull-requests: read
      actions: read
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            platform: linux
          - name: windows
            os: windows-latest
            platform: windows
          - name: macos-x64
            os: macos-15-intel
            platform: macos
            arch: x64
          - name: macos-arm64
            os: macos-15
            platform: macos
            arch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR head
        run: |
          git fetch origin +refs/pull/${{ inputs.pr }}/head:refs/remotes/origin/pr/${{ inputs.pr }}
          git checkout -qf refs/remotes/origin/pr/${{ inputs.pr }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.21.1
          cache: 'pnpm'

      - name: Install Linux Build Dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y icnsutils graphicsmagick xz-utils libx11-dev libxkbfile-dev gnome-keyring libsecret-1-dev libfontconfig-dev rpm

      # --ignore-scripts prevents postinstall from running; we replicate its
      # steps explicitly below so the environment is fully prepared first.
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply patches
        run: pnpm exec patch-package

      # Electron requires C++20 for native modules after Electron 33
      - name: Set C++20 for MacOS
        if: matrix.platform == 'macos'
        run: |
          echo "CXXFLAGS=-std=gnu++20 -stdlib=libc++" >> $GITHUB_ENV

      - name: Rebuild native modules for Electron (MacOS + Windows)
        if: matrix.platform != 'linux'
        run: pnpm exec electron-rebuild -f

      # Enforce using gcc/g++ on Linux for electron-rebuild instead of clang
      - name: Rebuild native modules for Electron (Ubuntu)
        if: matrix.platform == 'linux'
        run: USE_ELECTRON_CLANG=0 pnpm exec electron-rebuild -f

      - name: build-linux
        if: matrix.platform == 'linux'
        run: pnpm run build:linux

      - name: build-mac
        if: matrix.platform == 'macos'
        run: pnpm run build:mac -- --${{ matrix.arch }}

      - name: build-win
        if: matrix.platform == 'windows'
        run: pnpm run build:win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: marktext-${{ matrix.name }}
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
          if-no-files-found: error

  comment-on-pr:
    name: Comment artifact links on PR
    needs: run-on-pr-head
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
    steps:
      - name: Build comment body from artifacts
        id: build
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run_id = context.runId;
            const { data } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id,
              per_page: 100
            });

            if (!data.artifacts.length) {
              core.setOutput('body', 'No artifacts were uploaded.');
            } else {
              const rows = data.artifacts.map(a => {
                const artifactPage = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${run_id}/artifacts/${a.id}`;
                const sizeMB = (a.size_in_bytes / 1024 / 1024).toFixed(1);
                return `| ${a.name} | ${sizeMB} MB | [Download](${artifactPage}) |`;
              }).join('\n');

              const body = [
                `Build artifacts for PR #${{ inputs.pr }}:`,
                '',
                `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${run_id}`,
                '',
                '| Artifact | Size | Link |',
                '|---|---:|---|',
                rows
              ].join('\n');

              core.setOutput('body', body);
            }

      - name: Post or update PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ inputs.pr }}
          body: ${{ steps.build.outputs.body }}
          edit-mode: replace
          comment-tag: artifact-links
